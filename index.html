<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로모션_6월 대시보드</title>
<style>
  :root {
    --bg: #FAF9F6;
    --surface: #FFFFFF;
    --surface-muted: #F4F1EA;
    --border: #E5E1D8;
    --border-strong: #D3CFC4;
    --text-primary: #1F1D1A;
    --text-secondary: #6B675F;
    --text-muted: #9B968B;
    --accent: #D85A30;
    --accent-bg: #FAECE7;
    --accent-text: #712B13;
    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --green-bg: #EAF3DE; --green-text: #27500A;
    --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    line-height: 1.5;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.25rem;
  }
  .header .emoji { font-size: 22px; }
  .header h1 {
    font-size: 19px;
    font-weight: 600;
    margin: 0;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin: 4px 0 1.75rem;
  }
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.75rem;
  }
  .metric-card {
    background: var(--surface-muted);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
  }
  .metric-card .label {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin: 0 0 6px;
  }
  .metric-card .value {
    font-size: 24px;
    font-weight: 600;
    margin: 0;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1rem;
  }
  select {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 7px 28px 7px 12px;
    font-size: 13px;
    color: var(--text-primary);
    min-width: 120px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236B675F' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }
  .table-scroll {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1200px;
  }
  thead th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--surface-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface-muted); }
  .cell-title { white-space: normal; min-width: 220px; }
  .cell-kind { white-space: normal; color: var(--text-secondary); min-width: 200px; }
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }
  .b-blue   { background: var(--blue-bg);   color: var(--blue-text); }
  .b-amber  { background: var(--amber-bg);  color: var(--amber-text); }
  .b-purple { background: var(--purple-bg); color: var(--purple-text); }
  .b-green  { background: var(--green-bg);  color: var(--green-text); }
  .b-gray   { background: var(--gray-bg);   color: var(--gray-text); }
  .count-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
  }
  .footnote {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2.5rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }
  @media (max-width: 600px) {
    .wrap { padding: 1.5rem 1rem 3rem; }
    select { min-width: 100px; flex: 1 1 45%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <span class="emoji">🍊</span>
    <h1>프로모션_6월 · T1_ing</h1>
  </div>
  <p class="subtitle">노션 캡처 이미지에서 확인 가능한 항목 기준 대시보드</p>

  <div class="metrics" id="metrics"></div>

  <div class="controls">
    <select id="f-status"></select>
    <select id="f-manager"></select>
    <select id="f-category"></select>
    <select id="sort-by">
      <option value="recv-desc">수신일 최신순</option>
      <option value="recv-asc">수신일 오래된순</option>
      <option value="md-desc">MD 높은순</option>
      <option value="md-asc">MD 낮은순</option>
      <option value="open-asc">오픈일 빠른순</option>
    </select>
  </div>

  <div class="table-scroll">
    <table>
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <p class="count-label" id="count-label"></p>

  <p class="footnote" id="footnote">데이터 불러오는 중...</p>

</div>

<script>
// data.json은 GitHub Actions가 노션에서 가져와 주기적으로 갱신합니다.
// data.json을 아직 못 불러왔을 때를 위한 예비 데이터(최초 캡처 기준)
const FALLBACK_DATA = [
  {code:"1-2", recv:"2026-06-26", manager:"정성은", category:"월정액리텐션", title:"[헤나]SPOTV 럭키 슈팅 챌린지", job:"BTVEVT-9128", work:"2026-06-29~07-07", md:6.88, draft:"2026-07-07", open:"2026-07-10", status:"시안진행중", kind:"POP*8(개발팝업)/TDB/EPG*2/편성표배너"},
  {code:"1-4,1-7", recv:"2026-06-26", manager:"임세민", category:"B tv+ 홈", title:"★[우섭]Btv+Max 런칭 이승철콘서트", job:"BTVEVT-9126", work:"2026-06-29~07-06", md:24.5, draft:"2026-07-03", open:"2026-07-06", status:"시안진행중", kind:"POP*9(45,개발팝업)/FPB/TDB*2/EV2*2/..."},
  {code:"1-6", recv:"2026-06-25", manager:"임성빈", category:"PPC 영화", title:"[헤나]<현상수배> 타겟 프로모션", job:"BTVEVT-9121", work:"2026-06-29~06-30", md:2, draft:"2026-07-01", open:"2026-07-02", status:"내부수정중", kind:"PR/EV2/TOPB/LB"},
  {code:"1-1", recv:"2026-06-10", manager:"임세민", category:"B tv+ 홈", title:"[우섭]Btv+ 6월3주 첫달100원", job:"BTVEVT-9048", work:"2026-06-12~06-17", md:4.25, draft:"2026-06-18", open:"2026-06-19", status:"컨펌중", kind:"TDB/TOPB/EV2/PR*2/띠배너"},
  {code:"1-1", recv:"2026-06-23", manager:"이영은", category:"B tv+ 방송", title:"[우섭]B tv+ 6월 드라마&방송 신작 배너_3차", job:"BTVEVT-9104", work:"2026-06-30~06-30", md:1, draft:"2026-07-01", open:"2026-07-02", status:"컨펌중", kind:"LB*3"},
  {code:"1-3", recv:"2026-06-24", manager:"이영은", category:"B tv+ 홈", title:"[우섭]Btv+max 메뉴블록 제작", job:"BTVEVT-9117", work:"2026-06-26~06-26", md:1, draft:"2026-06-30", open:"2026-06-30", status:"컨펌중", kind:"MB*4"}
];

let DATA = FALLBACK_DATA;

const BADGE_CLASS = {
  "시안예정": "b-gray",
  "시안진행중": "b-blue",
  "내부수정중": "b-amber",
  "컨펌중": "b-purple",
  "완료": "b-green"
};

function badge(status) {
  const cls = BADGE_CLASS[status] || "b-gray";
  return '<span class="badge ' + cls + '">' + status + '</span>';
}

function uniq(arr) { return [...new Set(arr)]; }

function fillSelect(id, values, label) {
  const el = document.getElementById(id);
  el.innerHTML = '<option value="">' + label + ' 전체</option>' +
    values.map(v => '<option value="' + v + '">' + v + '</option>').join('');
}

const COLS = [
  {key:"code", label:"작업코드"},
  {key:"recv", label:"수신일"},
  {key:"manager", label:"매니저"},
  {key:"category", label:"카테고리"},
  {key:"title", label:"타이틀"},
  {key:"job", label:"일감번호"},
  {key:"work", label:"작업일"},
  {key:"md", label:"MD"},
  {key:"draft", label:"시안일"},
  {key:"open", label:"오픈일"},
  {key:"status", label:"작업상태"},
  {key:"kind", label:"종류"}
];

document.getElementById('thead-row').innerHTML =
  COLS.map(c => '<th>' + c.label + '</th>').join('');

function renderMetrics(rows) {
  const statuses = ["시안예정", "시안진행중", "내부수정중", "컨펌중"];
  const counts = {};
  statuses.forEach(s => counts[s] = DATA.filter(d => d.status === s).length);
  const totalMd = rows.reduce((a, d) => a + (typeof d.md === 'number' ? d.md : 0), 0);
  const cards = [
    {label: "전체 건수", value: DATA.length},
    {label: "시안진행중", value: counts["시안진행중"]},
    {label: "내부수정중", value: counts["내부수정중"]},
    {label: "컨펌중", value: counts["컨펌중"]},
    {label: "필터된 MD 합계", value: totalMd.toFixed(2)}
  ];
  document.getElementById('metrics').innerHTML = cards.map(c =>
    '<div class="metric-card"><p class="label">' + c.label + '</p><p class="value">' + c.value + '</p></div>'
  ).join('');
}

function applyFilters() {
  const fStatus = document.getElementById('f-status').value;
  const fManager = document.getElementById('f-manager').value;
  const fCategory = document.getElementById('f-category').value;
  const sortBy = document.getElementById('sort-by').value;

  let rows = DATA.filter(d =>
    (!fStatus || d.status === fStatus) &&
    (!fManager || d.manager === fManager) &&
    (!fCategory || d.category === fCategory)
  );

  rows = rows.slice().sort((a, b) => {
    if (sortBy === 'recv-desc') return a.recv < b.recv ? 1 : -1;
    if (sortBy === 'recv-asc') return a.recv > b.recv ? 1 : -1;
    if (sortBy === 'md-desc') return b.md - a.md;
    if (sortBy === 'md-asc') return a.md - b.md;
    if (sortBy === 'open-asc') return a.open > b.open ? 1 : -1;
    return 0;
  });

  document.getElementById('tbody').innerHTML = rows.map(d =>
    '<tr>' +
    COLS.map(c => {
      let val = d[c.key];
      if (c.key === 'status') return '<td>' + badge(val) + '</td>';
      if (c.key === 'md') return '<td>' + (typeof val === 'number' ? val.toFixed(2) : (val || '')) + '</td>';
      if (c.key === 'title') return '<td class="cell-title">' + val + '</td>';
      if (c.key === 'kind') return '<td class="cell-kind">' + val + '</td>';
      return '<td>' + val + '</td>';
    }).join('') +
    '</tr>'
  ).join('');

  document.getElementById('count-label').textContent =
    rows.length + '건 표시 중 (전체 ' + DATA.length + '건)';
  renderMetrics(rows);
}

function init() {
  fillSelect('f-status', uniq(DATA.map(d => d.status)), '작업상태');
  fillSelect('f-manager', uniq(DATA.map(d => d.manager)), '매니저');
  fillSelect('f-category', uniq(DATA.map(d => d.category)), '카테고리');
  applyFilters();
}

['f-status', 'f-manager', 'f-category', 'sort-by'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

async function loadData() {
  try {
    const res = await fetch('data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('data.json 응답 오류: ' + res.status);
    const json = await res.json();
    DATA = json.rows || FALLBACK_DATA;
    const synced = json.lastSynced ? new Date(json.lastSynced).toLocaleString('ko-KR') : '알 수 없음';
    document.getElementById('footnote').textContent =
      '노션과 자동 동기화됨 · 마지막 갱신: ' + synced;
  } catch (err) {
    DATA = FALLBACK_DATA;
    document.getElementById('footnote').textContent =
      'data.json을 아직 불러올 수 없어 예비 데이터로 표시 중입니다. GitHub Actions 동기화가 한 번 실행되면 자동으로 갱신됩니다.';
  }
  init();
}

loadData();
</script>
</body>
</html>
